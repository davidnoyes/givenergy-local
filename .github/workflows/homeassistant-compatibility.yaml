---
name: Home Assistant compatibility

"on":
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    name: Test against ${{ matrix.channel.name }}
    continue-on-error: ${{ matrix.channel.experimental }}
    strategy:
      fail-fast: false
      matrix:
        channel:
          - name: latest
            experimental: false
          - name: prerelease
            experimental: true

    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install requirements
        run: python -m pip install -r requirements.txt -r requirements_test.txt

      - name: Upgrade Home Assistant to prerelease
        if: matrix.channel.experimental
        run: >
          python -m pip install --upgrade --pre
          homeassistant pytest-homeassistant-custom-component

      - name: Run tests
        run: |
          pytest \
            -qq \
            --timeout=9 \
            --durations=10 \
            -n auto \
            --cov custom_components.givenergy_local \
            -o console_output_style=count \
            -p no:sugar \
            tests

      - name: Run Hassfest validation
        uses: home-assistant/actions/hassfest@master
